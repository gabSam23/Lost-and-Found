<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic page metadata -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Browser tab title -->
    <title>UR Lost &amp; Found - Storage</title>

    <!-- Bootstrap CSS for layout, spacing, buttons, table styling, and responsiveness -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <!-- Bootstrap Icons for menu, settings, and user icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Custom project stylesheet -->
    <link rel="stylesheet" href="../Public/css/style.css" />
</head>

<!-- portal-home-body applies the main page background and layout styling -->

<body class="portal-home-body">

    <!-- Top navigation/header bar -->
    <header class="portal-topbar">

        <!-- Left side of the top bar: menu icon + university logo -->
        <div class="portal-topbar-left">

            <!-- Menu button that currently links back to Home.html -->
            <a href="Home.html" class="portal-icon-btn" aria-label="Open menu">
                <i class="bi bi-grid-3x3-gap-fill"></i>
            </a>

            <!-- University of Regina logo / brand area -->
            <a href="Home.html" class="portal-brand" aria-label="University of Regina Home">
                <img src="../Public/images/UR_Logo_Primary_Reverse_White.png" alt="University of Regina logo"
                    class="portal-brand-logo" />
            </a>
        </div>

        <!-- Right side of the top bar: settings icon + account display -->
        <div class="portal-topbar-right">

            <!-- Settings button -->
            <button class="portal-icon-btn" type="button" aria-label="Settings">
                <i class="bi bi-gear-fill"></i>
            </button>

            <!-- User account area showing avatar icon and label -->
            <div class="portal-user-chip">
                <span class="portal-user-avatar" aria-hidden="true">
                    <i class="bi bi-person-fill"></i>
                </span>
                <span class="portal-user-name">Account</span>
            </div>
        </div>
    </header>

    <!-- Main page content -->
    <main class="portal-home-main">
        <div class="container py-4">

            <!-- Page title section -->
            <section class="portal-page-header">
                <h1 class="portal-page-title">Lost and Found Storage</h1>
            </section>

            <!-- Card section containing the storage/inventory table -->
            <section class="section-card">

                <!-- Makes the table horizontally scrollable on smaller screens -->
                <div class="table-responsive">
                    <table class="table align-middle mb-0">

                        <!-- Table header row -->
                        <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Image</th>
                                <th scope="col">Category</th>
                                <th scope="col">Description</th>
                                <th scope="col">Location</th>
                                <th scope="col">Date Logged</th>
                                <th scope="col">Actions</th>
                            </tr>
                        </thead>

                        <!-- Table body with one sample row -->
                        <tbody>
                            <tr>

                                <!-- Automatically generated item ID -->
                                <td>Generated automatically</td>

                                <!-- Placeholder showing accepted image format -->
                                <td>*jpg, *jpeg</td>

                                <!-- Item category placeholder -->
                                <td></td>

                                <!-- Item description placeholder -->
                                <td></td>

                                <!-- Found/storage location placeholder -->
                                <td></td>

                                <!-- Date placeholder -->
                                <td>MM/DD/YYYY</td>

                                <!-- Action buttons for modifying the item -->
                                <td>
                                    <div class="d-flex gap-2 flex-wrap">

                                        <!-- Edit button sends user to the item form page -->
                                        <a href="NewItem.html" class="btn btn-outline-primary btn-sm">Edit</a>

                                        <!-- Delete button for removing the item
                         Currently just a visual button with no functionality attached -->
                                        <button type="button" class="btn btn-outline-danger btn-sm">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer shown at the bottom of the page -->
    <footer class="site-footer py-4">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
            <p>2026 ENSE 281 Group F - UR Lost &amp; Found</p>
            <p>University of Regina</p>
        </div>
    </footer>

    <!-- Bootstrap JavaScript bundle for interactive Bootstrap components -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
