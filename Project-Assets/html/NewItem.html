<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UR Lost &amp; Found - Log New Item</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <link rel="stylesheet" href="../Public/css/style.css" />
</head>

<body class="portal-home-body">

    <!-- Same toolbar as Home page -->
    <header class="portal-topbar">
        <div class="portal-topbar-left">
            <a href="Home.html" class="portal-icon-btn" aria-label="Open menu">
                <i class="bi bi-grid-3x3-gap-fill"></i>
            </a>

            <a href="Home.html" class="portal-brand" aria-label="University of Regina Home">
                <img src="../Public/images/UR_Logo_Primary_Reverse_White.png" alt="University of Regina logo"
                    class="portal-brand-logo" />
            </a>
        </div>

        <div class="portal-topbar-right">
            <button class="portal-icon-btn" type="button" aria-label="Settings">
                <i class="bi bi-gear-fill"></i>
            </button>

            <div class="dropdown portal-user-dropdown">
                <button class="portal-user-chip portal-user-chip-toggle" type="button" data-bs-toggle="dropdown"
                    aria-expanded="false" aria-label="Open account menu">
                    <span class="portal-user-avatar" aria-hidden="true">
                        <i class="bi bi-person-fill"></i>
                    </span>
                    <span class="portal-user-name">Account</span>
                </button>

                <ul class="dropdown-menu dropdown-menu-end portal-signout-menu">
                    <li><a class="dropdown-item portal-signout-link" href="Login.html">Sign Out</a></li>
                </ul>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="portal-home-main">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-7 col-xl-6">
                    <section class="form-card">
                        <h1 class="portal-page-title mb-4">Lost Item Log</h1>

                        <form action="#" method="POST" class="row g-4">
                            <div class="col-12">
                                <label for="location" class="form-label">Location</label>
                                <select id="location" name="location" class="form-select" required>
                                    <option value="" selected disabled>Select location</option>
                                    <option>Classroom Building</option>
                                    <option>Riddell Centre</option>
                                    <option>Library</option>
                                    <option>Residence</option>
                                    <option>Other</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="category" class="form-label">Category</label>
                                <select id="category" name="category" class="form-select" required>
                                    <option value="" selected disabled>Select category</option>
                                    <option>Accessories</option>
                                    <option>Electronics</option>
                                    <option>Identification</option>
                                    <option>Clothing</option>
                                    <option>Other</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="itemImage" class="form-label">Upload Image(s)</label>
                                <input type="file" id="itemImage" name="itemImage" class="form-control" accept="image/*"
                                    multiple />
                            </div>

                            <div class="col-12">
                                <label for="description" class="form-label">Description</label>
                                <textarea id="description" name="description" class="form-control" rows="6"
                                    placeholder="Write item description" required></textarea>
                            </div>

                            <div class="col-12 d-flex justify-content-end">
                                <button type="submit" class="btn btn-brand">Submit</button>
                            </div>
                        </form>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer py-4">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
            <p>2026 ENSE 281 Group F - UR Lost &amp; Found</p>
            <p>University of Regina</p>
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
